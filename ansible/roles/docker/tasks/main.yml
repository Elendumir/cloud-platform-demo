---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    
- name: Start Docker service
  systemd:
    name: docker
    state: started
    enabled: yes
    
- name: Install python3-pip
  apt:
    name: python3-pip
    state: present

- name: Install Docker SDK
  apt:
    name: python3-docker
    state: present 
